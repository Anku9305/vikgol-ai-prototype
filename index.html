<!DOCTYPE html>
<html>
<head>

<title>Vikgol AI Architect</title>

<style>

body{
font-family: Arial;
background:#f3f4f6;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:180px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

.generate-btn{
margin-top:15px;
padding:12px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.generate-btn:hover{
background:#1d4ed8;
}

#result{
margin-top:30px;
white-space:pre-line;
font-family:monospace;
}

.consult{
margin-top:25px;
display:inline-block;
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:6px;
text-decoration:none;
}

.watermark{
position:fixed;
bottom:20px;
right:20px;
font-size:18px;
opacity:0.25;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="vikgol-logo.png">
</div>

<h2>AI Solution Architect</h2>

<h3>Describe your product idea</h3>

<textarea id="idea" placeholder="Example: Build AI logistics platform"></textarea>

<br>

<button class="generate-btn" onclick="generate()">
Generate Roadmap
</button>

<div id="result"></div>

<a class="consult"
href="https://wa.me/919940526611"
target="_blank">

Validate this Architecture with a Vikgol Senior Partner

</a>

</div>

<div class="watermark">
Confidential Architectural Draft
</div>

<script>

async function generate(){

const idea=document.getElementById("idea").value

const res=await fetch("/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({idea})
})

const data=await res.json()

document.getElementById("result").innerText=data.roadmap

}

</script>

</body>
</html>

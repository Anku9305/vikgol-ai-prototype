<!DOCTYPE html>
<html>
<head>
<title>Vikgol AI Architect</title>
</head>

<body style="font-family:Arial; margin:40px;">

<center>
<img src="vikgol-logo.png" width="200">
<h1>AI Solution Architect</h1>
</center>

<h3>Describe your product idea</h3>

<textarea id="idea" rows="6" cols="60"
placeholder="Example: Build a logistics AI platform"></textarea>

<br><br>

<button onclick="generate()"
style="padding:10px 20px;font-size:16px;">
Generate Roadmap
</button>

<br><br>

<pre id="result"></pre>

<br><br>

<a href="https://wa.me/919940526611" target="_blank">
<button style="
padding:12px 20px;
font-size:14px;
background:#16a34a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;">
Validate this Architecture with a Vikgol Senior Partner
</button>
</a>

<script>

async function generate(){

const idea = document.getElementById("idea").value;

const response = await fetch("/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ idea: idea })
});

const data = await response.json();

document.getElementById("result").innerText = data.roadmap;

}

</script>


<div style="
position:fixed;
bottom:20px;
right:20px;
opacity:0.25;
font-size:22px;
font-weight:bold;">
Confidential Architectural Draft
</div>

</body>
</html>
